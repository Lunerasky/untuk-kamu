<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kesayanganku</title>

<style>

body{
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(#0f0c29,#302b63,#24243e);
font-family:'Segoe UI',sans-serif;
overflow:hidden;
text-align:center;
color:white;
}

/* BINTANG */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* CARD */

.card{
background:white;
color:black;
padding:40px 25px;
border-radius:30px;
box-shadow:0 15px 30px rgba(0,0,0,0.3);
max-width:320px;
width:90%;
z-index:10;
}

/* RING BOX */

.ring-container{
margin-bottom:20px;
}

.ring-box{
width:120px;
height:70px;
background:#ffccd5;
margin:auto;
border-radius:10px;
position:relative;
cursor:pointer;
}

.lid{
width:120px;
height:35px;
background:#ff8fab;
position:absolute;
top:0;
left:0;
border-radius:10px 10px 0 0;
transform-origin:top;
transition:1s;
}
.ring{
font-size:40px;
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%) scale(0.5);
opacity:0;
transition:1.2s;
filter:drop-shadow(0 0 0 gold);
}

/* saat kotak terbuka */

.open .ring{
top:-60px;
opacity:1;
transform:translateX(-50%) scale(1.3);
animation:ringGlow 1.5s infinite alternate;
}

/* efek glow emas */

@keyframes ringGlow{

0%{
filter:drop-shadow(0 0 5px gold)
drop-shadow(0 0 10px gold);
}

100%{
filter:drop-shadow(0 0 15px gold)
drop-shadow(0 0 30px gold);
}

}
.

/* HEART */

.heart-icon{
font-size:50px;
color:#ff4d6d;
animation:pulse 1.2s infinite;
margin-bottom:15px;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* TEXT */

h1{
color:#d63384;
font-size:1.4rem;
}

p{
color:#555;
font-size:0.95rem;
line-height:1.5;
}

/* BUTTON */

.btn-group{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
}

button{
padding:12px 25px;
font-size:1rem;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

#yesBtn{
background:#ff4d6d;
color:white;
}

#noBtn{
background:#adb5bd;
color:white;
transition:0.1s;
}

/* CONFETTI */

.confetti{
position:fixed;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(720deg);
opacity:0;
}
}

</style>
</head>

<body>

<!-- MUSIK -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-background-112196.mp3" type="audio/mp3">
</audio>

<div class="card" id="content">

<div class="ring-container">
<div class="ring-box" id="box" onclick="openRing()">
<div class="lid"></div>
<div class="ring">💍</div>
</div>
</div>

<div class="heart-icon">❤️</div>

<h1>Halo Sayang...</h1>

<p>
Aku tahu semuanya terjadi begitu cepat.  
Tapi aku benar-benar serius sama kamu.  

Aku ingin bertanggung jawab, menjaga kamu dan anak kita,  
dan menjalani masa depan bersama.  

<b>Maukah kamu menikah dengan aku  
Vera Yunezza Alyvna? 🤍💐</b>
</p>

<div class="btn-group">
<button id="yesBtn" onclick="accepted()">Mau!</button>
</div>

<div>
<button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">Enggak</button>
</div>

</div>

<script>

/* GENERATE BINTANG */

for(let i=0;i<80;i++){
let star=document.createElement("div");
star.className="star";

star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";

document.body.appendChild(star);
}

/* BUKA CINCIN */

function openRing(){
const box=document.getElementById("box");
box.classList.toggle("open");
}

/* TOMBOL NO LARI */

function moveNo(){
const btn=document.getElementById('noBtn');

const x=Math.random()*(window.innerWidth-btn.offsetWidth);
const y=Math.random()*(window.innerHeight-btn.offsetHeight);

btn.style.position='fixed';
btn.style.left=x+'px';
btn.style.top=y+'px';
}

/* CONFETTI */

function createConfetti(){

for(let i=0;i<80;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*100+"vw";

confetti.style.background=
`hsl(${Math.random()*360},100%,50%)`;

confetti.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{confetti.remove();},5000);

}

}

/* ACCEPT */

function accepted(){

createConfetti();

const card=document.getElementById('content');

card.innerHTML=`
<div style="font-size:60px">💖</div>
<h1>Yeeayyy ❤️</h1>
<p>
Terima kasih sudah menerima aku.  
Aku janji akan menjaga kamu dan keluarga kecil kita.  
I Love You 🤍
</p>
`;

}

</script>

</body>
</html>
